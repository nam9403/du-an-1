changelog:
  exclude:
    labels:
      - ignore-for-release
  categories:
    - title: "🚀 Features"
      labels:
        - feature
        - enhancement
    - title: "🐛 Fixes"
      labels:
        - bug
        - fix
    - title: "🔐 Security"
      labels:
        - security
    - title: "🧪 Tests & CI"
      labels:
        - test
        - ci
    - title: "📝 Documentation"
      labels:
        - docs
    - title: "Other Changes"
      labels:
        - "*"

